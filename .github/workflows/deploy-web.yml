# Deploys apps/web to GitHub Pages. In repo Settings → Pages, set Source = GitHub Actions.
name: Deploy web to Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: apps/web/package-lock.json }
      - name: Install & build
        working-directory: apps/web
        env:
          # Use your repository name as the base path, e.g. /wegweiser
          NEXT_PUBLIC_BASE_PATH: ${{ vars.BASE_PATH }}
          # Optional: a deployed API to enable real AI in the hosted demo
          NEXT_PUBLIC_API_URL: ${{ vars.API_URL }}
        run: |
          npm ci || npm install
          npm run build
          touch out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with: { path: apps/web/out }
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

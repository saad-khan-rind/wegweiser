services:
  ollama:
    image: ollama/ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama

  ai:
    build: ./apps/ai
    ports: ["3002:3002"]
    environment:
      - USE_EMBEDDINGS=0

  api:
    build: ./apps/api
    ports: ["3001:3001"]
    environment:
      - PORT=3001
      - WEB_ORIGIN=http://204.168.210.222:3000
      - AI_SERVICE_URL=http://ai:3002
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      - ai
      - ollama

  web:
    build: ./apps/web
    ports: ["3000:3000"]
    environment:
      - NEXT_PUBLIC_API_URL=http://204.168.210.222:3002
    depends_on:
      - api

volumes:
  ollama_data:
    external: true
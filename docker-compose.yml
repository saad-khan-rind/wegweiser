# Wegweiser — full stack for a self-hosted server.
# docker compose up --build
services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    # ports: ["11434:11434"] # WARNING: Uncommenting this exposes your LLM to the public internet.
    volumes: ["ollama:/root/.ollama"]

  ai:
    build: ./apps/ai
    ports: ["4002:3002"] # Added external port 4002 for the AI service
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.1:8b
      - EMBED_MODEL=nomic-embed-text
      - AGENT_USE_WEB=1
      - AGENT_MAX_ITERS=1
      # Optional Pinecone (falls back to in-memory store if unset):
      - PINECONE_API_KEY=${PINECONE_API_KEY:-}
      - PINECONE_INDEX=${PINECONE_INDEX:-wegweiser}
      - PINECONE_CLOUD=${PINECONE_CLOUD:-aws}
      - PINECONE_REGION=${PINECONE_REGION:-us-east-1}
      # Always-latest crawl on boot + every 6h:
      - CRAWL_ON_START=1
      - CRAWL_INTERVAL_MIN=360
      - CRAWL_REGION=augsburg
      - CRAWL_LANG=de
    depends_on: [ollama]

  api:
    build: ./apps/api
    ports: ["4001:3001"] # Mapped external port 4001 to internal port 3001
    environment:
      - PORT=3001
      - WEB_ORIGIN=http://204.168.210.222:4000 # Must match frontend port for CORS
      - AI_SERVICE_URL=http://ai:3002
      - AGENT_TIMEOUT_MS=200000
      - ADMIN_TOKEN=${ADMIN_TOKEN:-change-me}
    depends_on: [ai]

  web:
    build: ./apps/web
    ports: ["4000:3000"] # Mapped external port 4000 to internal port 3000
    environment:
      # MUST be reachable from the user's browser (public IP), not localhost:
      - API_URL=http://204.168.210.222:4001 # FIXED: Points to API port 4001
      - WEB_TIMEOUT_MS=200000
      - PORT=3000
    depends_on: [api]

volumes:
  ollama: